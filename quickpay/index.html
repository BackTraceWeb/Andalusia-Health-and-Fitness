<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickPay Portal — Andalusia Health & Fitness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .quickpay-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 140px 20px 60px 20px;
    }
    .box {
      background: #111;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(255, 0, 80, 0.4);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #ff0066;
      margin-bottom: 25px;
    }
    input[type="text"] {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin: 8px 0;
      text-align: center;
      font-size: 16px;
    }
    button {
      width: 100%;
      max-width: 340px;
      margin-top: 15px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    button#findBtn {
      background: #ff0066;
      color: #fff;
    }
    button#findBtn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    button#payBtn {
      background: #333;
      color: #ccc;
    }
    button#payBtn.active {
      background: #a72852;
      color: #fff;
    }
    .status {
      margin-top: 20px;
      font-size: 0.95rem;
    }
    .status.ok { color: #ffffff; }
    .status.error { color: #ff1744; }
    .status.info { color: #ffffff; }
    .fine-print {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
    .fine-print a {
      color: #ff0066;
      text-decoration: none;
      font-weight: bold;
    }
    .fine-print a:hover {
      text-decoration: underline;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .quickpay-container {
        padding: 120px 16px 40px 16px;
      }
      .box {
        padding: 30px 20px;
        max-width: 100%;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }
      input[type="text"],
      button {
        max-width: 100%;
      }
    }

    @media (max-width: 380px) {
      .box {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body class="theme-andalusia">

<!-- Topbar -->
<div class="topbar">
  <div class="shell">
    <div class="brand-pill">
      <a href="../index.html"><img src="../AHFlogo.png" alt="Andalusia Health & Fitness"></a>
    </div>
    <nav class="mainnav">
      <a href="../index.html">Home</a>
      <a href="../pricing.html">Pricing</a>
      <a href="https://maps.google.com/?q=205+Church+St,+Andalusia,+AL+36420" target="_blank" rel="noopener">Location</a>
    </nav>
  </div>
</div>

<!-- CTA -->
<div class="ctabar">
  <div class="shell">
    <a href="/quickpay/" class="pill-cta">Quick Pay</a>
    <a href="tel:+13345822000" class="pill-cta">Call • (334) 582-2000</a>
  </div>
</div>

<div class="quickpay-container">
  <div class="box">
    <h1>QuickPay Portal</h1>

    <p>Enter your first and last name:</p>
    <input type="text" id="firstName" placeholder="First name">
    <input type="text" id="lastName" placeholder="Last name">

    <button id="findBtn" onclick="lookup()">Find Member</button>
    <div id="status" class="status"></div>

    <button id="payBtn" disabled>Pay Securely</button>

    <input type="hidden" id="memberId">
    <input type="hidden" id="invoiceId">

    <div class="fine-print">
      If you experience any issues with QuickPay, please contact the office at <a href="tel:+13345822000">(334) 582-2000</a>
    </div>
  </div>
</div>

<footer class="sitefoot">
  <div class="shell">
    <div class="footer-content">
      <span>© <script>document.write(new Date().getFullYear())</script> Andalusia Health & Fitness — Open 24/7.</span>
      <nav class="footer-links" aria-label="Footer">
        <a href="/Legal/privacy.html">Privacy Policy</a> |
        <a href="/Legal/terms.html">Terms & Conditions</a>
      </nav>
    </div>
  </div>
</footer>

  <script>
    const elFirst = document.getElementById('firstName');
    const elLast = document.getElementById('lastName');
    const elFindBtn = document.getElementById('findBtn');
    const elPayBtn = document.getElementById('payBtn');
    const elStatus = document.getElementById('status');
    const elMemberId = document.getElementById('memberId');
    const elInvoiceId = document.getElementById('invoiceId');

    async function lookup() {
      const first = elFirst.value.trim();
      const last = elLast.value.trim();

      if (!first || !last) {
        setStatus('Please enter both first and last name.', 'error');
        return;
      }

      setStatus('Looking up member...', 'info');
      elFindBtn.disabled = true;
      elPayBtn.disabled = true;

      try {
        const search = encodeURIComponent(`${first} ${last}`);
        const res = await fetch(`/api/member-detail.php?search=${search}`);
        const data = await res.json();

        if (!data.ok) {
          setStatus('Member not found or inactive.', 'error');
          elFindBtn.disabled = false;
          return;
        }

        const m = data.member;
        const isDraft = m.is_draft === 1 || m.is_draft === '1';
        const allowQuickPay = m.allow_quickpay === 1 || m.allow_quickpay === '1';

        // Allow payment if:
        // 1. Non-draft member with status === 'due' (normal flow)
        // 2. Draft member with QuickPay enabled by staff (backup when automatic payment fails)
        const canPay = data.invoice && (
          (!isDraft && data.status === 'due') ||
          (isDraft && allowQuickPay)
        );

        if (canPay) {
          const amount = `$${(data.invoice.amount_cents / 100).toFixed(2)}`;
          const draftNote = isDraft ? '<br><small style="color:#d81b60;">💳 You are on automatic bank draft. Use this only if your automatic payment failed.</small>' : '';
          setStatus(`
            <strong>${m.first_name} ${m.last_name}</strong> found.<br>
            Amount due: <strong>${amount}</strong><br>
            <small>Period ${data.invoice.period_start ?? ''} – ${data.invoice.period_end ?? ''}</small>${draftNote}
          `, 'ok');

          elMemberId.value = m.id;
          elInvoiceId.value = data.invoice.id;
          elPayBtn.disabled = false;
          elPayBtn.classList.add('active');
        } else if (isDraft && !allowQuickPay) {
          // Draft member but QuickPay not enabled
          setStatus(`<strong>${m.first_name} ${m.last_name}</strong> found.<br>You are on automatic bank draft. If your payment failed, please contact the gym to enable manual payment.`, 'ok');
          elPayBtn.disabled = true;
          elPayBtn.classList.remove('active');
        } else {
          setStatus(`<strong>${m.first_name} ${m.last_name}</strong> found.<br>No payment is due right now.`, 'ok');
          elPayBtn.disabled = true;
          elPayBtn.classList.remove('active');
        }

      } catch (err) {
        console.error(err);
        setStatus('Error contacting server.', 'error');
      } finally {
        elFindBtn.disabled = false;
      }
    }

    elPayBtn.onclick = function() {
      const memberId = elMemberId.value;
      const invoiceId = elInvoiceId.value;

      if (!memberId || !invoiceId) {
        alert('No member or invoice selected.');
        return;
      }

      // Important: Show reminder to click Continue for instant activation
      const confirmed = confirm(
        '⚠️ IMPORTANT: After completing payment, click "Continue" to instantly activate your access card.\n\n' +
        'Click OK to proceed to payment.'
      );

      if (!confirmed) {
        return;
      }

      // Store payment info in localStorage so return page can process it
      // localStorage survives redirects better than sessionStorage
      localStorage.setItem('quickpay_memberId', memberId);
      localStorage.setItem('quickpay_invoiceId', invoiceId);
      localStorage.setItem('quickpay_timestamp', Date.now());

      // Redirect directly into hosted Authorize.Net payment
      const url = `/api/payments/authorize-hosted.php?memberId=${encodeURIComponent(memberId)}&invoiceId=${encodeURIComponent(invoiceId)}`;
      window.location.href = url;
    };

    function setStatus(msg, cls) {
      elStatus.innerHTML = msg;
      elStatus.className = 'status ' + cls;
    }
  </script>
</body>
</html>
